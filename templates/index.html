<!DOCTYPE html>
<html>
<head>
    <title>QR Kontrol Paneli</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        textarea { width: 90%; height: 150px; margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: monospace; }
        #reader { width: 100%; border-radius: 8px; display: none; margin-top: 15px; }
        .status { padding: 15px; margin: 15px 0; border-radius: 8px; font-weight: bold; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-save { background: #007bff; color: white; }
        .btn-reset { background: #6c757d; color: white; display: none; }
        .btn-edit { background: none; color: #888; font-size: 13px; border: 1px solid #ddd; margin-top: 20px; width: auto; padding: 5px 15px; }
    </style>
</head>
<body>

<div class="card" id="setupSection">
    <h2>Şifre Listesini Yapıştır</h2>
    <textarea id="listeInput" placeholder="Her satıra bir şifre..."></textarea>
    <button class="btn-save" onclick="listeyiKaydet()">KAYDET VE BAŞLAT</button>
</div>

<div class="card" id="scanSection" style="display: none;">
    <div id="reader"></div>
    <div id="statusDisplay" class="status">Kamera Hazır...</div>
    <button id="resetBtn" class="btn-reset" onclick="yeniTarama()">YENİ TARAMA (A)</button>
    <button class="btn-edit" onclick="listeyeGeriDon()">← Listeyi Düzenle (Şifreli)</button>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    let kilitli = false;

    function listeyiKaydet() {
        const metin = document.getElementById('listeInput').value;
        if (!metin.trim()) return alert("Lütfen şifreleri girin!");

        fetch('/sifreleri_kaydet', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ liste: metin })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                document.getElementById('setupSection').style.display = 'none';
                document.getElementById('scanSection').style.display = 'block';
                document.getElementById('reader').style.display = 'block';
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
            }
        });
    }

    function listeyeGeriDon() {
        const pass = prompt("Düzenleme yetkisi için şifreyi girin:");
        if (!pass) return;

        fetch('/duzenleme_kontrol', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sifre: pass })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                html5QrCode.stop().then(() => {
                    document.getElementById('setupSection').style.display = 'block';
                    document.getElementById('scanSection').style.display = 'none';
                });
            } else {
                alert("Hatalı düzenleme şifresi!");
            }
        });
    }

    function onScanSuccess(decodedText) {
        if (kilitli) return;
        kilitli = true;
        html5QrCode.pause();

        fetch('/kontrol', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ qr_verisi: decodedText })
        })
        .then(res => res.json())
        .then(data => {
            const display = document.getElementById('statusDisplay');
            display.innerText = data.message;
            display.style.backgroundColor = data.color === 'green' ? '#d4edda' : '#f8d7da';
            display.style.color = data.color;
            document.getElementById('resetBtn').style.display = 'block';
        });
    }

    function yeniTarama() {
        kilitli = false;
        const display = document.getElementById('statusDisplay');
        display.innerText = "QR Okutun...";
        display.style.backgroundColor = "transparent";
        display.style.color = "black";
        document.getElementById('resetBtn').style.display = 'none';
        html5QrCode.resume();
    }

    document.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'a') yeniTarama(); });
</script>

</body>
</html>
